<!DOCTYPE html>

<html lang = "en">
    <body>
        <!--Formatting-->
        <div class="row">

            <div class="side">
                <!--Mix Types-->
                <button class="button-30" onclick="populate_dough_fields(0, 'White Bread')">        White Bread       </button>
                <button class="button-30" onclick="populate_dough_fields(1, 'WW Bread')">           Whole Wheat Bread          </button>
                <button class="button-30" onclick="populate_dough_fields(2, 'Softroll')">           Softroll          </button>
                <button class="button-30" onclick="populate_dough_fields(3, 'WW Softroll')">        Whole Wheat Softroll       </button>
                <button class="button-30" onclick="populate_dough_fields(4, 'Crusty / Kaiser')">    Crusty / Kaiser     </button>
                <button class="button-30" onclick="populate_dough_fields(5, 'WW Crusty / Kaiser')"> Whole Wheat Crusty / Kaiser  </button>
                <button class="button-30" onclick="populate_dough_fields(6, 'Multigrain')"> Multigrain  </button>
            </div>

            <div class="main" id="main"></div>

        </div>

        <!-- Reference js script -->
        <script src="main.js"></script>
    </body>
</html>
