<!DOCTYPE html>

<html lang = "en">
    <body>
        <!--Formatting-->
        <div class="row">

            <div class="side">

                <!--Mix Types-->
                <button class="button-30" onclick="assign_mix('w_bread')"> White Bread </button>
                <button class="button-30" onclick="assign_mix('ww_bread')"> Whole Wheat Bread </button>
                <button class="button-30" onclick="assign_mix('w_bun_dough')"> Softroll </button>
                <button class="button-30" onclick="assign_mix('ww_bun_dough')"> 60% Softroll </button>
                <button class="button-30" onclick="assign_mix('crusty_kaiser')"> Crusty / Kaiser</button>

            </div>

            <div class="main">
                
                <!--Calculator display-->
                <p id="mix_title"></p>
                <div class="lbs">
                    <input type="text" id="mix_input" placeholder="Input flour" class="pr">
                    <input type="text" id="hidden_inp" readonly value="lbs" disabled="disabled" class="ch"/> 
                </div>
                <button id="mix_button" onclick='calculate_mix()'>Click to calculate</button>
                <p id="mix_output"></p>

            </div>

        </div>

        <!-- Reference js script -->
        <script src="main.js"></script>
    </body>
</html>
